; switch-lan-play sysmodule configuration
; Copy this file to sdmc:/config/lan-play/config.ini

[server]
; Relay server address (e.g. your PC running switch-lan-play server)
host=

; Relay server port (default: 11451)
; port=11451

[network]
; Optional: override virtual IP (leave blank for auto from serial hash)
; ip=10.13.x.y
