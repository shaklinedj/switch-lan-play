version: "3.8"

services:
  lan-play-server:
    build: .
    # Or use the pre-built image:
    # image: spacemeowx2/switch-lan-play-server:latest
    container_name: lan-play-server
    restart: unless-stopped
    ports:
      - "11451:11451/udp"   # relay port (UDP only)
      - "11451:11451/tcp"   # monitor HTTP API
    # environment:
    #   Optional: require players to log in with a password.
    #   Uncomment and set a value to enable simple auth.
    #   USE_HTTP_PROVIDER: http://your-auth-service/verify
    volumes:
      - ./users.json:/app/users.json:ro   # optional JSON user list
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
